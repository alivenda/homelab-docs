site_name: Homelab Runbooks
site_description: Turing Pi 2 + 4x CM4 k3s homelab — from zero to self-hosted everything
site_url: https://alivenda.github.io/homelab-docs/
repo_url: https://github.com/alivenda/homelab-docs
repo_name: alivenda/homelab-docs
edit_uri: edit/main/docs/

# Fail the build (with `mkdocs build --strict`) on broken internal links and
# anchors. Without this, anchor checks are INFO-level and slip through CI.
validation:
  links:
    not_found: warn
    anchors: warn

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys

plugins:
  - search

nav:
  - Home: index.md
  - Foundation:
      - Runbook 0 — Prerequisites: 00-prerequisites.md
      - Runbook 1 — Git: 01-git.md
  - Infrastructure:
      - Runbook 2 — Networking: 02-networking.md
      - Runbook 3 — Turing Pi: 03-turing-pi.md
      - Runbook 4 — Ansible: 04-ansible.md
      - Runbook 5 — Kubernetes: 05-kubernetes.md
      - Runbook 6 — Traefik: 06-traefik.md
      - Runbook 7 — Vaultwarden: 07-vaultwarden.md
      - Runbook 8 — Terraform: 08-terraform.md
      - Runbook 9 — Observability: 09-observability.md
      - Runbook 10 — Backups: 10-backups.md
      - Runbook 11 — Forgejo: 11-forgejo.md
      - Runbook 12 — CI/CD: 12-cicd.md
      - Runbook 17 — AdGuard Home: 17-adguard-home.md
      - Runbook 18 — Authelia + lldap: 18-authelia.md
      - Runbook 19 — ntfy: 19-ntfy.md
  - Apps:
      - Deploying an App (pattern): apps-deploy-pattern.md
      - App Catalog (simple services): apps-catalog.md
      - Runbook 13 — Nextcloud: 13-nextcloud.md
      - Runbook 14 — Paperless-ngx: 14-paperless.md
      - Runbook 15 — Immich: 15-immich.md
      - Runbook 16 — Home Assistant: 16-home-assistant.md
      - Runbook 20 — Homepage: 20-homepage.md
      - Runbook 21 — Arr Stack: 21-arr-stack.md
      - Runbook 22 — BookStack: 22-bookstack.md
      - Runbook 23 — Syncthing: 23-syncthing.md
      - Runbook 24 — RustDesk Server: 24-rustdesk.md
      - Runbook 25 — Reactive Resume: 25-reactive-resume.md
      - Runbook 26 — Ollama + Open WebUI: 26-ollama.md
  - Version History: version-history.md

extra:
  generator: false
