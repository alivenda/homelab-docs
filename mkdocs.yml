site_name: Homelab Runbooks
site_description: Turing Pi 2 + 4x CM4 k3s homelab — from zero to self-hosted everything
site_url: https://alivenda.github.io/homelab-docs/
repo_url: https://github.com/alivenda/homelab-docs
repo_name: alivenda/homelab-docs
edit_uri: edit/main/docs/

# Fail the build (with `mkdocs build --strict`) on broken internal links and
# anchors. Without this, anchor checks are INFO-level and slip through CI.
validation:
  links:
    not_found: warn
    anchors: warn

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys

plugins:
  - search

nav:
  - Home: index.md
  - Foundation:
      - Prerequisites: prerequisites.md
      - Git Foundation: git.md
  - Infrastructure:
      - Networking: networking.md
      - Turing Pi: turing-pi.md
      - Ansible: ansible.md
      - Kubernetes: kubernetes.md
      - Traefik: traefik.md
      - Terraform: terraform.md
      - Storage & Data Architecture: storage-architecture.md
      - Observability: observability.md
      - Backups & DR: backups.md
      - Disaster Recovery: disaster-recovery.md
      - Cold Shutdown: cold-shutdown.md
  - Platform Services:
      - Vaultwarden: vaultwarden.md
      - Authelia + lldap: authelia.md
      - ntfy: ntfy.md
      - NAS PostgreSQL: nas-postgres.md
      - Forgejo: forgejo.md
      - Woodpecker CI/CD: woodpecker.md
      - AdGuard Home: adguard-home.md
  - Apps:
      - Deploying an App (pattern): apps-deploy-pattern.md
      - App Catalog: apps-catalog.md
      - Nextcloud: nextcloud.md
      - Paperless-ngx: paperless.md
      - Immich: immich.md
      - Home Assistant: home-assistant.md
      - Homepage: homepage.md
      - Vikunja: vikunja.md
      - Miniflux: miniflux.md
  - Planned & Future:
      - Personal Cloud Stack (overview): personal-cloud-stack.md
      - Arr Stack (shelved): arr-stack.md
      - BookStack: bookstack.md
      - Syncthing: syncthing.md
      - RustDesk: rustdesk.md
      - Reactive Resume: reactive-resume.md
      - Ollama + Open WebUI: ollama.md
  - Version History: version-history.md

extra:
  generator: false
