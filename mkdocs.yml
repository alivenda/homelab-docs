site_name: Homelab Runbooks
site_description: Turing Pi 2 + 4x CM4 k3s homelab — from zero to self-hosted everything
site_url: https://alivenda.github.io/homelab-docs/
repo_url: https://github.com/alivenda/homelab-docs
repo_name: alivenda/homelab-docs
edit_uri: edit/main/docs/

# Fail the build (with `mkdocs build --strict`) on broken internal links and
# anchors. Without this, anchor checks are INFO-level and slip through CI.
validation:
  links:
    not_found: warn
    anchors: warn

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys

plugins:
  - search
  # Keep the old numbered URLs (e.g. /00-prerequisites/) resolving after the
  # rename to slug-based pages, so external bookmarks and inbound links don't 404.
  - redirects:
      redirect_maps:
        '00-prerequisites.md': 'prerequisites.md'
        '01-git.md': 'git.md'
        '02-networking.md': 'networking.md'
        '03-turing-pi.md': 'turing-pi.md'
        '04-ansible.md': 'ansible.md'
        '05-kubernetes.md': 'kubernetes.md'
        '06-traefik.md': 'traefik.md'
        '07-vaultwarden.md': 'vaultwarden.md'
        '08-terraform.md': 'terraform.md'
        '09-observability.md': 'observability.md'
        '10-backups.md': 'backups.md'
        '11-forgejo.md': 'forgejo.md'
        '12-cicd.md': 'woodpecker.md'
        '13-nextcloud.md': 'nextcloud.md'
        '14-paperless.md': 'paperless.md'
        '15-immich.md': 'immich.md'
        '16-home-assistant.md': 'home-assistant.md'
        '17-adguard-home.md': 'adguard-home.md'
        '18-authelia.md': 'authelia.md'
        '19-ntfy.md': 'ntfy.md'
        '20-homepage.md': 'homepage.md'
        '21-arr-stack.md': 'arr-stack.md'
        '22-bookstack.md': 'bookstack.md'
        '23-syncthing.md': 'syncthing.md'
        '24-rustdesk.md': 'rustdesk.md'
        '25-reactive-resume.md': 'reactive-resume.md'
        '26-ollama.md': 'ollama.md'
        '27-nas-postgres.md': 'nas-postgres.md'
        '28-vikunja.md': 'vikunja.md'
        '29-miniflux.md': 'miniflux.md'

nav:
  - Home: index.md
  - Foundation:
      - Prerequisites: prerequisites.md
      - Git Foundation: git.md
  - Infrastructure:
      - Networking: networking.md
      - Turing Pi: turing-pi.md
      - Ansible: ansible.md
      - Kubernetes: kubernetes.md
      - Traefik: traefik.md
      - Vaultwarden: vaultwarden.md
      - Terraform: terraform.md
      - Observability: observability.md
      - Backups & DR: backups.md
      - Storage & Data Architecture: storage-architecture.md
      - Forgejo: forgejo.md
      - Woodpecker CI/CD: woodpecker.md
      - AdGuard Home: adguard-home.md
      - Authelia + lldap: authelia.md
      - ntfy: ntfy.md
      - NAS PostgreSQL: nas-postgres.md
      - Cold Shutdown & Storage: cold-shutdown.md
  - Apps:
      - Deploying an App (pattern): apps-deploy-pattern.md
      - App Catalog (simple services): apps-catalog.md
      - Nextcloud: nextcloud.md
      - Paperless-ngx: paperless.md
      - Immich: immich.md
      - Home Assistant: home-assistant.md
      - Homepage: homepage.md
      - Arr Stack: arr-stack.md
      - BookStack: bookstack.md
      - Syncthing: syncthing.md
      - RustDesk Server: rustdesk.md
      - Reactive Resume: reactive-resume.md
      - Ollama + Open WebUI: ollama.md
      - Vikunja: vikunja.md
      - Miniflux: miniflux.md
  - Version History: version-history.md

extra:
  generator: false
